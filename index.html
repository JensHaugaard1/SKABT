<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="https://use.typekit.net/xbq0rrx.css">
  <title>ZINE</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #ffffff;
      overflow: hidden;
      font-family: "indivisible", sans-serif;
        font-weight: 400;
    font-style: normal;
      }

    canvas{
      position: fixed;
      inset: 0;
      z-index: 49;
      pointer-events: auto;
      background: transparent;
      transition: scale .25s ease-in-out;;
    }

    .scene-fallback{
      position: fixed;
      top: 50%;
      left: 50%;
      width: min(42vw, 520px);
      max-width: calc(100vw - 48px);
      height: auto;
      z-index: 48;
      pointer-events: none;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity .25s ease;
    }

    .scene-fallback.active{
      opacity: 1;
    }

    p {
      margin: 0;
    }

    ::selection {
      background: #fffe00;
      color: #e42b00;
    }

    ::-moz-selection {
      background: #fffe00;
      color: #e42b00;
    }

    .text{
      position: fixed;
      bottom: 20px;
      right: 20px;
      max-width: 46ch;
      z-index: 50;
      color: #000000;
      font-size: .875rem;
      line-height: .875rem;
      text-align: right;
    }

   /* --- desktop layout --- */
.logo,
.logo2{
  position: fixed;
  top: 20px;
  z-index: 10;
  pointer-events: none;
  width: 20vw;              /* defines each "column" */
  display: flex;
  align-items: center;      /* keeps image vertically aligned inside column */
}

.logo{
  left: 20px;
  justify-content: flex-start;  /* left aligned inside left column */
}

.logo2{
  right: 20px;
  justify-content: flex-end;    /* right aligned inside right column */
}

.logo img,
.logo2 img{
  height: 3vh;     /* identical height */
  width: auto;
  display: block;
}


@media screen and (max-width: 800px) {

  .logo,
  .logo2{
    position: fixed;
    top: 0;
    transform: none;
    width: 50vw;        /* split top into two halves */
    height: auto;
    padding: 15px;
  }

  .logo{
    left: 0;
    justify-content: flex-start;
  }

  .logo2{
    right: 0;
    justify-content: flex-end;
  }

  .logo img,
  .logo2 img{
    height: 3vh;   /* smaller for mobile */
  }
}


    .links{
      position: fixed;
      Left: 20px;
      bottom: 20px;
      z-index: 50;
      display: flex;
      gap: 20px;
      font-size: .875rem;
    }

.links a,
.links a:visited {
  position: relative;
  color: #000000 !important;
  text-decoration: none !important;
  display: inline-block; /* important for ::after sizing */
  isolation: isolate;
}

.links a .link-label {
  position: relative;
  z-index: 2;
  color: #000000;
  transition: color 0.12s ease;
}

/* filled box */
.links a::after {
  content: "";
  position: absolute;
  inset: 1px -1.5px;
  background: #fffe00;
  pointer-events: none;
  z-index: 1;

  opacity: 0;
  transform: scaleX(0);
  transform-origin: right;

  transition:
    opacity 0.12s ease,
    transform 0.25s cubic-bezier(0, -0.03, 0.28, 1);
}

/* hover / focus */
.links a:hover::after,
.links a:focus-visible::after {
  opacity: 1;
  transform: scaleX(1);
  transform-origin: left;
}

.links a:hover .link-label,
.links a:focus-visible .link-label {
  color: #e42b00;
}

@media screen and (max-width: 800px) { 

     .links {
        font-size: .875rem;
     }

     .text {
            font-size: 0.6rem;
            line-height: 0.6rem;
            max-width: 36ch;
        }

    canvas {
        scale: 75%;
        transition: scale .25s ease-in-out;;
    }

    .scene-fallback{
      width: min(72vw, 520px);
    }

    .links a::after,
    .overlay-esc::after{
      display: none;
    }

    .links a:hover .link-label,
    .links a:focus-visible .link-label,
    .overlay-esc:hover .link-label,
    .overlay-esc:focus-visible .link-label{
      color: #000000;
      mix-blend-mode: normal;
    }
    }

.stocklist-overlay{
  position: fixed;
  inset: 0;
  background: rgba(255, 255, 255, 0.96);
  z-index: 100;

  display: flex;
  align-items: center;
  justify-content: center;

  opacity: 0;
  pointer-events: none;
  transition: opacity .25s ease;
}

.stocklist-overlay.active{
  opacity: 1;
  pointer-events: auto;
}

/* ESC link styled exactly like your nav links */
.overlay-esc{
  position: fixed;
      Left: 20px;
      bottom: 20px;
      z-index: 50;
      display: flex;
      gap: 20px;
      font-size: .875rem;
}

/* reuse your link styling */
.overlay-esc,
.overlay-esc:visited{
  color: #000000 !important;
  text-decoration: none !important;
  font-size: .875rem;
  position: relative;
  display: inline-block;
  position: absolute !important;
  isolation: isolate;
}

.overlay-esc .link-label{
  position: relative;
  z-index: 2;
  color: #000000;
  transition: color 0.12s ease;
}

/* same hover fill effect */
.overlay-esc::after{
  content: "";
  position: absolute;
  inset: 1px -1.5px;
  background: #fffe00;
  pointer-events: none;
  z-index: 1;

  opacity: 0;
  transform: scaleX(0);
  transform-origin: right;

  transition:
    opacity 0.12s ease,
    transform 0.25s cubic-bezier(0, -0.03, 0.28, 1);
}

.overlay-esc:hover::after,
.overlay-esc:focus-visible::after{
  opacity: 1;
  transform: scaleX(1);
  transform-origin: left;
}

.overlay-esc:hover .link-label,
.overlay-esc:focus-visible .link-label{
  color: #e42b00;
}

.stocklist-content{
  max-width: 600px;
  padding: 40px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  color: #000000;
}


.sticker-layer{
  position: fixed;
  inset: 0;
  z-index: 49;
  pointer-events: none;
  overflow: visible;
}

.sticker{
  position: fixed;
  top: 0;
  left: 0;
  height: auto;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
  transform-origin: center center;
}

.stocklist-content a,
.stocklist-content a:visited{
  color:#000000;
  text-decoration:none;
}

  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>

<body>
  <img src="./ZINE FALLBACK.png" alt="" class="scene-fallback" id="sceneFallback" hidden>

  <div class="logo">
    <img src="./Asset 2.svg" alt="Logo">
  </div>

  <div class="logo2">
    <img src="./Asset 1.svg" alt="Logo">
  </div>

  <div class="text">
<p>
    Convo er et magasin, der hylder unges kreativitet på tværs af brancher.
Vi giver unge en scene til at dele deres rejse, erfaringer og kreative håndværk.
Kreativitet ses som en drivkraft og et sprog, der kan udfordre normer og inspirere andre.
</p>

  </div>

  <nav class="links">
    <a href="#" id="openStocklist"><span class="link-label">STOCKLIST</span></a>
   
  </nav>

  <div class="stocklist-overlay" id="stocklistOverlay" aria-hidden="true">

  <a href="#" class="overlay-esc" id="closeStocklist"><span class="link-label">ESC</span></a>

  <div class="stocklist-content">
   <a href="https://maps.app.goo.gl/1atLFS4GpDeisL5w8" target="_blank" rel="noopener">
  <p>
    KISMET <br>
    Adelgade 16, 1304 København K
  </p>
</a>
  </div>
</div>



  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import { RoomEnvironment } from "three/addons/environments/RoomEnvironment.js";

    const fallbackImage = document.getElementById("sceneFallback");
    const FALLBACK_IMAGE_SRC = "./ZINE FALLBACK.png";
    fallbackImage.src = FALLBACK_IMAGE_SRC;

    function showFallback(rendererInstance) {
      fallbackImage.hidden = false;
      fallbackImage.classList.add("active");
      if (rendererInstance) rendererInstance.domElement.style.display = "none";
    }

    const scene = new THREE.Scene(); // transparent (no background)
    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.01, 1000);
    const material = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5, metalness: 0.5 });
    camera.position.set(0, 0, 3);
    THREE.ColorManagement.enabled = false;
    
    let renderer = null;

    try {
      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1;
      document.body.appendChild(renderer.domElement);
    } catch (err) {
      console.error("WebGL init error:", err);
      showFallback();
    }
    


    // Soft environment lighting
    if (renderer) {
      const pmrem = new THREE.PMREMGenerator(renderer);
      scene.environment = pmrem.fromScene(new RoomEnvironment(renderer), 0.05).texture;
      scene.add(new THREE.AmbientLight(0xffffff, 1));
    }
    
   




    

    // Load model
    const loader = new GLTFLoader();
    let model = null;

    if (renderer) loader.load("./ZINE.glb", (gltf) => {
      model = gltf.scene;
      scene.add(model);

      // Center
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.sub(center);


      // Scale
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      model.scale.setScalar(1.6 / maxDim);

      // Fix shading / gaps
      model.traverse((obj) => {
  if (!obj.isMesh) return;

  const geo = obj.geometry;
  if (!geo.attributes.normal) geo.computeVertexNormals();

  const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
  mats.forEach((m) => {
    m.side = THREE.DoubleSide;

    m.dithering = true;        
    m.needsUpdate = true;
  });
});

    }, undefined, (err) => {
      console.error("GLB load error:", err);
      showFallback(renderer);
    });

    // Rotation (Z only) with inertia + easing
    let rotZ = 0;        // current (rendered)
    let targetRotZ = 0;  // target
    let velZ = 0;        // inertial velocity

    const AUTO = 0.0015;     // idle spin
    const DRAG_SENS = 0.012; // drag sensitivity
    const FOLLOW = 0.12;     // easing toward target
    const FRICTION = 0.92;   // ease-out after release

    addEventListener("wheel", (e) => {
      targetRotZ += e.deltaY * 0.002;
    }, { passive: true });

    let dragging = false;
    let lastX = 0;

    addEventListener("pointerdown", (e) => {
      dragging = true;
      lastX = e.clientX;
      velZ = 0;

      addEventListener("pointermove", onMove);
      addEventListener("pointerup", onUp, { once: true });
    });

    function onMove(e) {
      if (!dragging) return;
      const dx = e.clientX - lastX;
      lastX = e.clientX;

      const delta = dx * DRAG_SENS;
      targetRotZ += delta;
      velZ = delta;
    }

    function onUp() {
      dragging = false;
      removeEventListener("pointermove", onMove);
    }

    addEventListener("resize", () => {
      if (!renderer) return;
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    });

    function animate() {
      if (!renderer) return;
      requestAnimationFrame(animate);

      targetRotZ += AUTO;

      if (!dragging) {
        velZ *= FRICTION;
        targetRotZ += velZ;
      }

      rotZ += (targetRotZ - rotZ) * FOLLOW;

      if (model) model.rotation.y = rotZ;

      renderer.render(scene, camera);
    }
    if (renderer) animate();


    const overlay = document.getElementById("stocklistOverlay");
const openBtn = document.getElementById("openStocklist");
const closeBtn = document.getElementById("closeStocklist");

openBtn.addEventListener("click", (e) => {
  e.preventDefault();
  overlay.classList.add("active");
  document.body.style.overflow = "hidden";
});

function closeOverlay(e){
  if (e) e.preventDefault();
  overlay.classList.remove("active");
  document.body.style.overflow = "";
}

closeBtn.addEventListener("click", closeOverlay);

addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeOverlay();
});

const stickerSources = [
  "./sticker-1.png",
  "./sticker-2.png",
  "./sticker-3.png",
  "./sticker-4.png"
];


const stickerLayer = document.createElement("div");
stickerLayer.className = "sticker-layer";
document.body.appendChild(stickerLayer);

const stickers = [];
const MAX_STICKERS = 3;

function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function addSticker(x, y) {
  const img = document.createElement("img");
  img.className = "sticker";
  img.src = stickerSources[Math.floor(Math.random() * stickerSources.length)];
  img.alt = "";
  img.draggable = false;

  const isMobile = window.innerWidth <= 800;
  const sizeMultiplier = isMobile ? 1.5 : 1;
  const sizeVw = rand(25, 35) * sizeMultiplier;
  const rotation = rand(-45, 45);

  img.style.width = `${sizeVw}vw`;

  stickerLayer.appendChild(img);

  img.onload = () => {
    const rect = img.getBoundingClientRect();

    const finalX = x - rect.width / 2;
    const finalY = y - rect.height / 2;

    img.style.transform = `translate3d(${finalX}px, ${finalY}px, 0) rotate(${rotation}deg)`;
  };

  stickers.push(img);

  if (stickers.length > MAX_STICKERS) {
    const oldest = stickers.shift();
    if (oldest) oldest.remove();
  }
}

document.body.addEventListener("click", (e) => {
  if (e.target.closest("a, button")) return;
  addSticker(e.clientX, e.clientY);
});
  </script>
</body>
</html>
